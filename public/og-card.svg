<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#262a31" stroke-width="1"></path>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#7ec9ff" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#7ec9ff" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1d22" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#1a1d22" stop-opacity="1"></stop>
    </linearGradient>
  </defs>

  
  <rect width="1200" height="630" fill="#1a1d22"></rect>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"></rect>
  <rect width="1200" height="630" fill="url(#glow)"></rect>

  
  <g transform="translate(72, 72)">
    <circle cx="6" cy="8" r="6" fill="#7ec9ff"></circle>
    <text x="22" y="13" font-family="ui-monospace, &#39;JetBrains Mono&#39;, monospace" font-size="16" fill="#dee2e8" letter-spacing="1">raymond.ting <tspan fill="#62686e">// SE</tspan></text>
  </g>

  
  <g transform="translate(72, 220)">
    <text font-family="ui-monospace, &#39;JetBrains Mono&#39;, monospace" font-size="18" fill="#a8aeb5" letter-spacing="3">
      <tspan fill="#7ec9ff">●</tspan>  SYSTEM ONLINE  <tspan fill="#62686e">/</tspan>  PORTFOLIO V1.0
    </text>
  </g>

  
  <g transform="translate(72, 290)">
    <text font-family="&#39;Inter Tight&#39;, sans-serif" font-weight="500" font-size="92" fill="#f5f6f8" letter-spacing="-3">
      <tspan x="0" dy="0">I Don’t Just Build Apps.</tspan>
      <tspan x="0" dy="105">I <tspan fill="#7ec9ff">Ship</tspan> Systems<tspan fill="#7ec9ff">.</tspan></tspan>
    </text>
  </g>

  
  <g transform="translate(72, 560)">
    <line x1="0" y1="-12" x2="1056" y2="-12" stroke="#34393f" stroke-width="1"></line>
    <text font-family="ui-monospace, &#39;JetBrains Mono&#39;, monospace" font-size="16" fill="#a8aeb5" letter-spacing="1.5">
